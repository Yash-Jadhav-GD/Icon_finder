<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Icon Library (GEP Solution Design)</title>
    <!-- Keep Inter as a fallback, but rely on local Aptos first -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>

    <div class="app-container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Minimal Icon Library <span class="subtitle">(GEP Solution Design)</span></h1>
            </div>
            
            <div class="sidebar-section">
                <h3 class="section-title">Libraries</h3>
                <div class="library-toggles">
                    <button class="library-btn active" data-source="both">All Libraries</button>
                    <button class="library-btn" data-source="gep">GEP Minimal</button>
                    <button class="library-btn" data-source="external">3rd-Party Icons</button>
                </div>
            </div>

            <div class="sidebar-section">
                <h3 class="section-title">Categories</h3>
                <div class="category-filters" id="categoryFilters">
                    <button class="filter-btn active" data-filter="all">All Icons</button>
                    <!-- Categories will be dynamically injected here -->
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="top-bar">
                <div class="search-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search icons... (e.g. upload, check, ai, 5g)">
                </div>
                <div class="stats">
                    <span id="resultCount">0</span> icons found
                </div>
            </div>

            <div class="icon-grid" id="iconGrid">
                <!-- Icons will be injected here via app.js -->
            </div>
            
            <!-- Loading indicator -->
            <div id="loading" class="loading">Loading icons...</div>
        </main>
    </div>

    <!-- Icon Detail Drawer (formerly Modal) -->
    <div id="iconModal" class="drawer-overlay">
        <div class="drawer-content">
            <button class="drawer-close" id="closeModal">&times;</button>
            <div class="drawer-header">
                <div class="drawer-icon-preview">
                    <img id="modalIconImg" src="" alt="Icon Preview">
                </div>
                <div class="drawer-info">
                    <h2 id="modalIconName">Icon Name</h2>
                    <p id="modalIconLabel">Full label description goes here...</p>
                    <div class="drawer-actions">
                        <button class="btn btn-primary" id="modalCopySvg">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px; vertical-align:middle"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            Copy SVG
                        </button>
                        <button class="btn btn-secondary" id="modalCopyName">Copy Name</button>
                    </div>
                </div>
            </div>
            <div class="related-section">
                <h3>Related Icons</h3>
                <div class="related-grid" id="relatedGrid">
                    <!-- Related icons will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification for Copy Success -->
    <div id="toast" class="toast">Copied SVG graphic to clipboard!</div>

    <script src="app.js?v=18"></script>
</body>
</html>
